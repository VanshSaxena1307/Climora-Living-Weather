<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb35a"/>
      <stop offset="100%" stop-color="#ff7a59"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="68%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#182233"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </radialGradient>
  </defs>

  <!-- background tile, rounded to match the app's radius language -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bgGlow)"/>

  <!-- sun rays -->
  <g stroke="url(#sunGrad)" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="6"  x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="58"/>
    <line x1="6"  y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="58" y2="32"/>
    <line x1="13.5" y1="13.5" x2="19" y2="19"/>
    <line x1="45" y1="45" x2="50.5" y2="50.5"/>
    <line x1="13.5" y1="50.5" x2="19" y2="45"/>
    <line x1="45" y1="19" x2="50.5" y2="13.5"/>
  </g>

  <!-- sun core -->
  <circle cx="32" cy="32" r="13" fill="url(#sunGrad)"/>
</svg>
